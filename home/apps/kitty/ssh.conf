# Kitten SSH configuration.
#
# Home Manager sets shell_integration to no-rc in kitty.conf because it
# sources the integration script itself via .bashrc. However, kitten ssh
# inherits this setting for the REMOTE host, where HM isn't managing the
# shell — so the integration script never runs, and kittens (icat, transfer,
# etc.) aren't available remotely. Override it here so the remote shell
# gets full integration.

shell_integration enabled
