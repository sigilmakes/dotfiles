#####################################################################
# MONITORS
#####################################################################
# To find output names: hyprctl monitors
# Format: monitor = name, resolution@refresh, position, scale

# Primary ‚ÄĒ 1440p on HDMI
monitor = HDMI-A-1, 2560x1440@120, 0x0, 1

# Fallback ‚ÄĒ any other monitor plugged in gets auto-configured
monitor = , preferred, auto, 1


#####################################################################
# XWAYLAND
#####################################################################

xwayland {
    force_zero_scaling = true
}


#####################################################################
# MACHINE-SPECIFIC BINDS
#####################################################################

# Push-to-talk voice transcription
bind = SUPER, code:82, exec, push-to-talk.sh start
bindr = SUPER, code:82, exec, push-to-talk.sh stop
bind = SUPER, code:20, exec, push-to-talk.sh start
bindr = SUPER, code:20, exec, push-to-talk.sh stop
