# Machine Configuration Template
# Copy this file and rename it to match your hostname (e.g., myhostname.conf)
# Then update the source line in hyprland.conf to point to your config
#
# To find your hostname, run: hostnamectl hostname

# ▀█▀ █▀▀ █▀▄▀█ █▀█ █░░ ▄▀█ ▀█▀ █▀▀
# ░█░ ██▄ █░▀░█ █▀▀ █▄▄ █▀█ ░█░ ██▄


#####################################################################
# STARTUP PROGRAMS
#####################################################################
# Add machine-specific startup programs here
# exec-once = your-app-here


#####################################################################
# GPU CONFIGURATION
#####################################################################
# Uncomment and modify the appropriate section for your GPU

# --- NVIDIA GPU ---
# See https://wiki.hyprland.org/Nvidia/
# env = LIBVA_DRIVER_NAME,nvidia
# env = XDG_SESSION_TYPE,wayland
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = __GL_VRR_ALLOWED,1
# env = NVD_BACKEND,direct
# cursor:no_hardware_cursors = true
# render {
#   direct_scanout = false
# }

# --- AMD GPU ---
# env = LIBVA_DRIVER_NAME,radeonsi
# env = AMD_VULKAN_ICD,radv

# --- Intel GPU ---
# env = LIBVA_DRIVER_NAME,iHD


#####################################################################
# MONITORS
#####################################################################
# Configure your monitors here
# Use `hyprctl monitors` to find monitor names and supported resolutions
#
# Format: monitor = name, resolution@refresh, position, scale
# Example: monitor = DP-1, 2560x1440@144, 0x0, 1
# Example: monitor = eDP-1, 1920x1080@60, 2560x0, 1

# Default: auto-configure all monitors
monitor = , preferred, auto, 1


#####################################################################
# XWAYLAND
#####################################################################

xwayland {
    force_zero_scaling = true
}


#####################################################################
# APPLICATION ASSIGNMENTS
#####################################################################
# Set your preferred applications here

$term = kitty
$file = dolphin
$browser = firefox
$quicklaunch = rofi -show drun
$quicklaunch2 = rofi -show run
$aiassistant = claude


